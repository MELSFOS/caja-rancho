function log(msg, tipo='info') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${tipo}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

async function migrar() {
  const btn = document.getElementById('btn-migrar');
  btn.disabled = true;
  btn.textContent = 'Migrando...';
  document.getElementById('log').innerHTML = '';
  log(`Iniciando migración de ${movimientos.length} movimientos...`);

  try {
    const res = await fetch(`${SB_URL}/rest/v1/movimientos`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(movimientos)
    });

    if (res.ok) {
      log(`✅ ¡Listo! Los ${movimientos.length} movimientos fueron guardados en Supabase.`, 'ok');
      log(`💰 Saldo: $41,060.00`, 'ok');
      log(`\nAhora abre la app en GitHub y verifica que aparezcan todos los datos.`, 'ok');
      btn.textContent = '✅ Migración completada';
    } else {
      const txt = await res.text();
      log(`❌ Error ${res.status}: ${txt}`, 'err');
      btn.disabled = false;
      btn.textContent = 'Reintentar';
    }
  } catch(e) {
    log(`❌ Error de conexión: ${e.message}`, 'err');
    btn.disabled = false;
    btn.textContent = 'Reintentar';
  }
}
